<div class="bg-gray-900 rounded-lg border border-gray-800 p-4">
    <div class="flex items-center justify-between mb-3">
        <h3 class="text-sm font-medium text-gray-300">
            Logs — <span class="font-mono text-xs">{{.ContainerID}}</span>
        </h3>
        <div class="flex gap-2">
            <button onclick="navigator.clipboard.writeText(document.getElementById('log-content').innerText)"
                    class="px-2 py-1 text-xs bg-gray-800 rounded hover:bg-gray-700">
                Copy
            </button>
            <button onclick="document.getElementById('detail-panel').replaceChildren()"
                    class="px-2 py-1 text-xs bg-gray-800 rounded hover:bg-gray-700">
                Close
            </button>
        </div>
    </div>
    <pre id="log-content"
         class="text-xs font-mono text-gray-400 overflow-x-auto max-h-96 overflow-y-auto leading-relaxed">{{.Logs}}</pre>
</div>
