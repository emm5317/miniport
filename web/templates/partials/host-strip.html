{{if .Host}}
<div class="host-strip">
    <div class="hstat">
        <div class="hstat-label">CPU</div>
        <div class="hstat-val">{{printf "%.1f" .Host.CPUPercent}}%</div>
        <div class="hstat-bar">
            <div class="hstat-fill green" style="width:{{printf "%.1f" (capPct .Host.CPUPercent)}}%"></div>
        </div>
    </div>
    <div class="hstat">
        <div class="hstat-label">Memory</div>
        <div class="hstat-val">{{formatBytes .Host.MemUsed}} / {{formatBytes .Host.MemTotal}}</div>
        <div class="hstat-bar">
            <div class="hstat-fill blue" style="width:{{printf "%.1f" (capPct .Host.MemPercent)}}%"></div>
        </div>
    </div>
    <div class="hstat">
        <div class="hstat-label">Disk</div>
        <div class="hstat-val">{{printf "%.1f" .Host.DiskPercent}}%</div>
        <div class="hstat-bar">
            <div class="hstat-fill amber" style="width:{{printf "%.1f" (capPct .Host.DiskPercent)}}%"></div>
        </div>
    </div>
    <div class="hstat">
        <div class="hstat-label">Network ↓↑</div>
        <div class="hstat-val">{{formatBytes .Host.NetRx}} / {{formatBytes .Host.NetTx}}</div>
    </div>
    <div class="hstat">
        <div class="hstat-label">Uptime</div>
        <div class="hstat-val">{{.Host.Uptime}}</div>
    </div>
</div>
{{end}}
