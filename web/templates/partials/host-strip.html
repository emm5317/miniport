{{if .Host}}
<div class="flex flex-wrap gap-4 mb-4 text-sm px-4 py-3 bg-gray-900/50 rounded-lg border border-gray-800/50 items-center">
    <span class="text-gray-500 text-xs font-medium">HOST</span>
    <div class="flex items-center gap-1.5">
        <span class="text-gray-500 text-xs">CPU</span>
        <div class="stat-bar" style="width:4rem"><div class="stat-fill bg-emerald-400" style="width:{{printf "%.0f" (capPct .Host.CPUPercent)}}%"></div></div>
        <span class="font-mono text-xs">{{printf "%.1f" .Host.CPUPercent}}%</span>
    </div>
    <div class="flex items-center gap-1.5">
        <span class="text-gray-500 text-xs">Mem</span>
        <div class="stat-bar" style="width:4rem"><div class="stat-fill bg-cyan-400" style="width:{{printf "%.0f" (capPct .Host.MemPercent)}}%"></div></div>
        <span class="font-mono text-xs">{{formatBytes .Host.MemUsed}} / {{formatBytes .Host.MemTotal}}</span>
    </div>
    <div class="flex items-center gap-1.5">
        <span class="text-gray-500 text-xs">Disk</span>
        <div class="stat-bar" style="width:4rem"><div class="stat-fill bg-yellow-500" style="width:{{printf "%.0f" (capPct .Host.DiskPercent)}}%"></div></div>
        <span class="font-mono text-xs">{{printf "%.1f" .Host.DiskPercent}}%</span>
    </div>
    <div class="flex items-center gap-1.5">
        <span class="text-gray-500 text-xs">Net</span>
        <span class="font-mono text-xs text-gray-400">↓{{formatBytes .Host.NetRx}} ↑{{formatBytes .Host.NetTx}}</span>
    </div>
    <div class="flex items-center gap-1.5">
        <span class="text-gray-500 text-xs">Up</span>
        <span class="font-mono text-xs text-gray-400">{{.Host.Uptime}}</span>
    </div>
</div>
{{end}}
