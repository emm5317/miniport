<div class="flex flex-wrap gap-4 mb-4 text-sm px-4 py-3 bg-gray-900/50 rounded-lg border border-gray-800/50">
    <div class="flex items-center gap-1.5">
        <span class="text-gray-500">Total</span>
        <span class="font-mono font-semibold">{{.Total}}</span>
    </div>
    <div class="flex items-center gap-1.5">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span>
        <span class="text-gray-500">Running</span>
        <span class="font-mono font-semibold text-emerald-400">{{.Running}}</span>
    </div>
    <div class="flex items-center gap-1.5">
        <span class="text-gray-500">Stopped</span>
        <span class="font-mono font-semibold text-gray-400">{{.Stopped}}</span>
    </div>
    {{if gt .Unhealthy 0}}
    <div class="flex items-center gap-1.5">
        <span class="text-gray-500">Unhealthy</span>
        <span class="font-mono font-semibold text-red-400">{{.Unhealthy}}</span>
    </div>
    {{end}}
    {{if gt .Total 0}}
    <div class="flex items-center gap-2" style="min-width:120px">
        <svg viewBox="0 0 100 6" class="w-full" style="max-width:120px;height:6px">
            {{if gt .Running 0}}<rect x="0" y="0" width="{{pct .Running .Total}}" height="6" rx="3" fill="#34d399"/>{{end}}
            {{if gt .Stopped 0}}<rect x="{{pct .Running .Total}}" y="0" width="{{pct .Stopped .Total}}" height="6" rx="0" fill="#4b5563"/>{{end}}
            {{if gt .Unhealthy 0}}<rect x="{{addPct .Running .Stopped .Total}}" y="0" width="{{pct .Unhealthy .Total}}" height="6" rx="0" fill="#f87171"/>{{end}}
        </svg>
    </div>
    {{end}}
</div>
