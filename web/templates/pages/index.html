<div id="container-list"
     hx-get="/containers"
     hx-trigger="every 10s, refresh-containers from:body"
     hx-swap="innerHTML">
    {{template "container-table.html" .}}
</div>
{{if .Services}}
<div id="service-list"
     hx-get="/services"
     hx-trigger="every 10s, refresh-services from:body"
     hx-swap="innerHTML">
    {{template "service-table.html" .}}
</div>
{{end}}
<div style="margin-top:1.5rem">
    <h3 class="text-sm font-medium text-secondary mb-2">Images</h3>
    <div id="image-list"
         hx-get="/images"
         hx-trigger="every 30s, refresh-images from:body"
         hx-swap="innerHTML">
        {{template "image-table.html" .}}
    </div>
</div>
<div id="detail-panel" style="margin-top:1.5rem"></div>
